# HTTP -> HTTPS redirect + sertifika indirme (iOS için)
server {
    listen 80;

    location = /pistorage-cert {
        proxy_pass https://192.168.1.77:3443/cert;
        proxy_ssl_verify off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/certs/todoapp.crt;
    ssl_certificate_key /etc/nginx/certs/todoapp.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # PiStorage WebDAV — iOS Files buraya bağlanır
    location /dav {
        proxy_pass https://192.168.1.77:3443;
        proxy_ssl_verify off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # PiStorage sertifikası indir (HTTPS üzerinden)
    location = /pistorage-cert {
        proxy_pass https://192.168.1.77:3443/cert;
        proxy_ssl_verify off;
    }

    # Serve uploaded files directly from shared volume
    location /uploads/ {
        alias /app/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 25m;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
